<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Outreach Cockpit</title>
<style>
  :root{--bg:#fafaf8;--card:#fff;--ink:#1a1a1a;--muted:#6b6b6b;--line:#e7e7e2;--hot:#d6453a;--accent:#2f6f4f}
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
  header{padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{margin:0;font-size:20px}
  header .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .wrap{max-width:680px;margin:0 auto;padding:14px 16px 160px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .name{font-weight:600;font-size:17px}
  .tags{font-size:12px;color:var(--muted);margin-top:2px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .Hot{background:var(--hot)} .Warm{background:#e0922f} .Cold{background:#9aa}
  .next{font-size:13px;color:var(--muted);margin-top:8px}
  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  a.btn,button.btn{font-size:13px;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 12px;border-radius:9px;cursor:pointer}
  a.btn.call{border-color:var(--accent);color:var(--accent)}
  button.done{border-color:var(--accent);color:var(--accent)}
  .empty{text-align:center;color:var(--muted);padding:40px}
  /* chat */
  #chat{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line)}
  #log{max-height:34vh;overflow:auto;padding:10px 16px;max-width:680px;margin:0 auto}
  .msg{margin:6px 0;font-size:14px}
  .msg.you{text-align:right;color:#333}
  .msg.bot{color:var(--accent)}
  #bar{display:flex;gap:8px;padding:10px 16px;max-width:680px;margin:0 auto;border-top:1px solid var(--line)}
  #bar input{flex:1;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px}
  #bar button{padding:0 16px;border:0;background:var(--accent);color:#fff;border-radius:10px;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>Today's Run</h1>
  <div class="sub" id="count">Loading…</div>
</header>
<div class="wrap" id="list"></div>

<div id="chat">
  <div id="log"><div class="msg bot">Tell me how each touch went — "texted Lee, wants a call Thursday" — and I'll log it and tee up the next.</div></div>
  <div id="bar">
    <input id="say" placeholder="Log a touch…" autocomplete="off" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const digits = p => (p||'').replace(/[^0-9+]/g,'');
let history = [];

async function load(){
  const r = await fetch('/api/today'); const data = await r.json();
  $('#count').textContent = data.length + ' due today';
  const list = $('#list'); list.innerHTML = '';
  if(!data.length){ list.innerHTML = '<div class="empty">Nothing due. You’re clear. \u{1F44A}</div>'; return; }
  for(const p of data){
    const d = digits(p.phone);
    const card = document.createElement('div'); card.className='card';
    card.innerHTML = `
      <div class="row">
        <div>
          <div class="name">${p.name}</div>
          <div class="tags"><span class="dot ${p.warmth}"></span>${[p.warmth,p.lane,p.stage].filter(Boolean).join(' · ')}</div>
        </div>
      </div>
      ${p.nextStep?`<div class="next">➤ ${p.nextStep}</div>`:''}
      <div class="actions">
        ${d?`<a class="btn call" href="tel:${d}">Call</a><a class="btn" href="sms:${d}">Text</a>`:'<span class="tags">no number</span>'}
        <button class="btn done" onclick="quick('${p.id}','${p.name.replace(/'/g,"")}')">Reached → next week</button>
      </div>`;
    list.appendChild(card);
  }
}

async function quick(id,name){
  const d = new Date(Date.now()+7*864e5).toISOString().slice(0,10);
  await fetch('/api/capture',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,last_contact:new Date().toISOString().slice(0,10),next_touch:d,notes_append:'Reached out (quick log).'})});
  log('bot','Logged '+name+' — next touch in a week.');
  load();
}

function log(who,text){ const l=$('#log'); const m=document.createElement('div'); m.className='msg '+who; m.textContent=text; l.appendChild(m); l.scrollTop=l.scrollHeight; }

async function send(){
  const v = $('#say').value.trim(); if(!v) return;
  $('#say').value=''; log('you',v);
  history.push({role:'user',content:v});
  log('bot','…');
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    const j = await r.json();
    $('#log').lastChild.remove();
    log('bot', j.reply || j.error || 'done');
    if(j.messages) history = j.messages;
    load();
  }catch(e){ $('#log').lastChild.remove(); log('bot','error: '+e.message); }
}
$('#say').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
load();
</script>
</body>
</html>
